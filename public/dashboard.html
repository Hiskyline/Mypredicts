<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monarch AI Dashboard</title>

<style>
body{
background:#0d1117;
color:#00ffa6;
font-family:monospace;
padding:40px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

h1{
letter-spacing:2px;
}

</style>
</head>

<body>

<h1>MONARCH AI CONTROL PANEL</h1>

<div class="card">
Games analyzed: <span id="games">0</span>
</div>

<div class="card">
Prediction tiles:
<div id="tiles"></div>
</div>

<script>

async function update(){

let r = await fetch("/api/ext/predictions?mode=AI_Mode&count=5");
let d = await r.json();

document.getElementById("games").innerText = d[0].games_analyzed;
document.getElementById("tiles").innerText = d[0].tile_array.join(", ");

}

setInterval(update,2000);
update();

</script>

</body>
</html>
